name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
      - uses: gradle/gradle-build-action@v3
      - name: Create local.properties
        run: |
          echo "pb.host=127.0.0.1" > local.properties
          echo "pb.port=5005" >> local.properties
      - run: ./gradlew lint
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint*

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
      - uses: gradle/gradle-build-action@v3
      - name: Create local.properties
        run: |
          echo "pb.host=127.0.0.1" > local.properties
          echo "pb.port=5005" >> local.properties
      - run: ./gradlew testDebugUnitTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

  build-debug:
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
      - uses: gradle/gradle-build-action@v3
      - name: Create local.properties
        run: |
          echo "pb.host=127.0.0.1" > local.properties
          echo "pb.port=5005" >> local.properties
          echo "signing.storePassword=" >> local.properties
          echo "signing.keyPassword=" >> local.properties
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    if: github.ref == 'refs/heads/main'
    needs: [build-debug]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
      - uses: gradle/gradle-build-action@v3
      - name: Create local.properties with secrets
        run: |
          echo "pb.host=${{ secrets.PB_HOST }}" > local.properties
          echo "pb.port=${{ secrets.PB_PORT }}" >> local.properties
          echo "signing.storeFile=${{ secrets.SIGNING_STORE_FILE }}" >> local.properties
          echo "signing.storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
